<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Abraham</title>
  <meta name="description" content="Leonard Abraham — photographs, films, objects." />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #050505;
      --soft: #eeeeee;
      --muted: #9a9a9a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
      font-weight: 400;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 22px 24px;
    }

    .identity {
      position: relative;
      z-index: 2;
      display: inline-grid;
      gap: 8px;
      margin-left: 24px;
      font-size: clamp(11px, 1.15vw, 15px);
      line-height: 1.05;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name {
      display: block;
    }

    .nav {
      position: relative;
      display: block;
      white-space: nowrap;
      font-size: 0.78em;
      line-height: 1;
      letter-spacing: 0.12em;
      padding-bottom: 110px;
    }

    .nav-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .nav-prompt {
      display: inline-block;
      margin-right: 2px;
    }

    .nav a,
    .nav span {
      display: inline-block;
    }

    .subnav {
      position: absolute;
      left: 2.65ch;
      top: 0.7em;
      display: grid;
      gap: 5px;
      min-width: 34ch;
      padding: 20px 170px 34px 0;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: auto;
      font-size: 0.88em;
      line-height: 1;
      letter-spacing: 0.1em;
      transition: none;
    }

    .subnav a::before {
      content: ">";
      display: inline-block;
      margin-right: 6px;
    }

    .nav:has(.photographs-trigger:hover) .photographs-subnav,
    .nav:has(.photographs-trigger:focus-visible) .photographs-subnav,
    .nav:has(.photographs-subnav:hover) .photographs-subnav,
    .nav:has(.photographs-subnav:focus-within) .photographs-subnav,
    .nav:has(.films-trigger:hover) .films-subnav,
    .nav:has(.films-trigger:focus-visible) .films-subnav,
    .nav:has(.films-subnav:hover) .films-subnav,
    .nav:has(.films-subnav:focus-within) .films-subnav {
      opacity: 1;
      visibility: visible;
      transition-delay: 0s;
    }

    .media-stage {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .media-slide {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -46%);
      opacity: 0;
      overflow: hidden;
      background: transparent;
    }

    .media-slide.vertical {
      width: min(36vw, 500px);
      aspect-ratio: 1198 / 1714;
      animation: showVertical 10s steps(1, end) infinite;
    }

    .media-slide.horizontal {
      width: min(62vw, 980px);
      aspect-ratio: 1584 / 1131;
      animation: showHorizontal 10s steps(1, end) infinite;
    }

    .media-slide.added.third {
      animation: showAdded3 10s steps(1, end) infinite;
    }

    .media-slide.added.fourth {
      animation: showAdded4 10s steps(1, end) infinite;
    }

    .media-slide.added.fifth {
      animation: showAdded5 10s steps(1, end) infinite;
    }

    .media-slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .media-slide.added img {
      width: auto;
      height: auto;
      max-width: min(62vw, 980px);
      max-height: 72vh;
      object-fit: contain;
    }

    .contact {
      position: fixed;
      left: 24px;
      bottom: 22px;
      z-index: 2;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes showVertical {
      0%, 19.999% { opacity: 1; }
      20%, 100% { opacity: 0; }
    }

    @keyframes showHorizontal {
      0%, 19.999% { opacity: 0; }
      20%, 39.999% { opacity: 1; }
      40%, 100% { opacity: 0; }
    }

    @keyframes showAdded3 {
      0%, 39.999% { opacity: 0; }
      40%, 59.999% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    @keyframes showAdded4 {
      0%, 59.999% { opacity: 0; }
      60%, 79.999% { opacity: 1; }
      80%, 100% { opacity: 0; }
    }

    @keyframes showAdded5 {
      0%, 79.999% { opacity: 0; }
      80%, 100% { opacity: 1; }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100svh;
        padding: 18px;
      }

      .identity {
        margin-left: 0;
        font-size: 12px;
        gap: 7px;
      }

      .nav {
        font-size: 0.76em;
        padding-bottom: 110px;
      }

      .nav-row {
        gap: 4px;
      }

      .subnav {
        left: 2.65ch;
        gap: 5px;
        min-width: 32ch;
        padding: 20px 120px 34px 0;
        font-size: 0.86em;
      }

      .media-slide.vertical {
        width: calc(100vw - 36px);
        max-width: 420px;
        top: 52%;
      }

      .media-slide.horizontal {
        width: calc(100vw - 36px);
        max-width: 520px;
        top: 52%;
      }

      .media-slide.added img {
        max-width: calc(100vw - 36px);
        max-height: 70vh;
      }

      .contact {
        left: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="identity" aria-label="Leonard Abraham site navigation">
      <a class="name" href="/">Leonard Abraham</a>
      <nav class="nav">
        <div class="nav-row">
          <span class="nav-prompt">&gt;</span>
          <a class="photographs-trigger" href="#photographs">Photographs</a>
          <span>--</span>
          <a class="films-trigger" href="#films">Films</a>
          <span>--</span>
          <a href="#objects">Objects</a>
        </div>
        <div class="subnav photographs-subnav" aria-label="Photographs categories">
          <a href="#photographs-personal">Personal</a>
          <a href="#photographs-portraits">Portraits</a>
          <a href="#photographs-fashion">Fashion</a>
        </div>
        <div class="subnav films-subnav" aria-label="Films categories">
          <a href="personal-films.html">Personal</a>
          <a href="#films-music-video">Music Video</a>
          <a href="commercials.html">Commercials</a>
          <a href="#films-shorts">Shorts</a>
        </div>
      </nav>
    </header>

    <section class="media-stage" aria-label="Homepage rotating media">
      <div class="media-slide vertical">
        <img src="assets%3Adossier-personage-45degree.jpg" alt="Dossier Personage portrait placeholder" />
      </div>
      <div class="media-slide horizontal">
        <img src="dossier-personage-no1-pg.jpg.jpg" alt="Dossier Personage page spread placeholder" />
      </div>
      <div class="media-slide added third">
        <img src="homepage-rotation-03.jpg" alt="Homepage rotation image 03" />
      </div>
      <div class="media-slide added fourth">
        <img src="homepage-rotation-04.jpg" alt="Homepage rotation image 04" />
      </div>
      <div class="media-slide added fifth">
        <img src="homepage-rotation-05.jpg" alt="Homepage rotation image 05" />
      </div>
    </section>

    <a class="contact" href="mailto:info@leonardabraham.com">info@leonardabraham.com</a>
  </main>
</body>
</html>
