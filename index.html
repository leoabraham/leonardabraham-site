<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Abraham</title>
  <meta name="description" content="Leonard Abraham — photographs, films, objects." />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #050505;
      --soft: #eeeeee;
      --muted: #9a9a9a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
      font-weight: 400;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 22px 24px;
    }

    .identity {
      position: relative;
      z-index: 2;
      display: inline-grid;
      gap: 8px;
      margin-left: 24px;
      font-size: clamp(11px, 1.15vw, 15px);
      line-height: 1.05;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name {
      display: block;
    }

    .nav {
      position: relative;
      display: flex;
      gap: 5px;
      align-items: center;
      white-space: nowrap;
      font-size: 0.78em;
      line-height: 1;
      letter-spacing: 0.12em;
      padding-bottom: 78px;
    }

    .nav::before {
      content: ">";
      display: inline-block;
      margin-right: 2px;
    }

    .nav a,
    .nav span {
      display: inline-block;
    }

    .nav-group {
      position: relative;
    }

    .subnav {
      position: absolute;
      left: 0;
      top: 1.8em;
      display: grid;
      gap: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      font-size: 0.88em;
      line-height: 1;
      letter-spacing: 0.1em;
    }

    .subnav a::before {
      content: ">";
      display: inline-block;
      margin-right: 6px;
    }

    .nav-group:hover .subnav,
    .nav-group:focus-within .subnav {
      opacity: 1;
      pointer-events: auto;
    }

    .media-stage {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .media-slide {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -46%);
      opacity: 0;
      overflow: hidden;
      background: transparent;
    }

    .media-slide.vertical {
      width: min(36vw, 500px);
      aspect-ratio: 1198 / 1714;
      animation: showVertical 10s steps(1, end) infinite;
    }

    .media-slide.horizontal {
      width: min(62vw, 980px);
      aspect-ratio: 1584 / 1131;
      animation: showHorizontal 10s steps(1, end) infinite;
    }

    .media-slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .contact {
      position: fixed;
      left: 24px;
      bottom: 22px;
      z-index: 2;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes showVertical {
      0%, 49.999% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes showHorizontal {
      0%, 49.999% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100svh;
        padding: 18px;
      }

      .identity {
        margin-left: 0;
        font-size: 12px;
        gap: 7px;
      }

      .nav {
        gap: 4px;
        font-size: 0.76em;
        padding-bottom: 78px;
      }

      .subnav {
        gap: 5px;
        font-size: 0.86em;
      }

      .media-slide.vertical {
        width: calc(100vw - 36px);
        max-width: 420px;
        top: 52%;
      }

      .media-slide.horizontal {
        width: calc(100vw - 36px);
        max-width: 520px;
        top: 52%;
      }

      .contact {
        left: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="identity" aria-label="Leonard Abraham site navigation">
      <a class="name" href="/">Leonard Abraham</a>
      <nav class="nav">
        <span class="nav-group">
          <a href="#photographs">Photographs</a>
          <span class="subnav" aria-label="Photographs categories">
            <a href="#photographs-personal">Personal</a>
            <a href="#photographs-fashion">Fashion</a>
          </span>
        </span>
        <span>--</span>
        <span class="nav-group">
          <a href="#films">Films</a>
          <span class="subnav" aria-label="Films categories">
            <a href="#films-personal">Personal</a>
            <a href="#films-music-video">Music Video</a>
            <a href="#films-commercials">Commercials</a>
            <a href="#films-shorts">Shorts</a>
          </span>
        </span>
        <span>--</span>
        <a href="#objects">Objects</a>
      </nav>
    </header>

    <section class="media-stage" aria-label="Homepage rotating media">
      <div class="media-slide vertical">
        <img src="assets%3Adossier-personage-45degree.jpg" alt="Dossier Personage portrait placeholder" />
      </div>
      <div class="media-slide horizontal">
        <img src="dossier-personage-no1-pg.jpg.jpg" alt="Dossier Personage page spread placeholder" />
      </div>
    </section>

    <a class="contact" href="mailto:info@leonardabraham.com">info@leonardabraham.com</a>
  </main>
</body>
</html>
