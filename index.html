<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Abraham</title>
  <meta name="description" content="Director, Photographer, Artist. New portfolio site coming soon." />
  <style>
    :root {
      --bg: #0f0f0f;
      --fg: #f2eee7;
      --muted: #b4ada3;
      --line: rgba(242, 238, 231, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
    }

    .frame {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      padding: 56px 40px;
      background: rgba(255,255,255,0.02);
    }

    .kicker {
      margin: 0 0 18px;
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 72px);
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .role {
      margin: 22px 0 0;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      width: 72px;
      height: 1px;
      background: var(--line);
      margin: 34px 0;
    }

    .copy {
      margin: 0;
      max-width: 34rem;
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.5;
    }

    .contact {
      margin-top: 28px;
      font-size: 16px;
      color: var(--muted);
    }

    .contact a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
    }

    .footer {
      margin-top: 52px;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .frame {
        padding: 40px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="kicker">Leonard Abraham</p>
    <h1>New work<br>coming soon</h1>
    <p class="role">Director · Photographer · Artist</p>
    <div class="divider"></div>
    <p class="copy">
      A portfolio site is currently in development. For collaborations, commissions, and production inquiries, please get in touch below.
    </p>
    <p class="contact">
      <a href="mailto:info@leonardabraham.com">info@leonardabraham.com</a>
    </p>
    <p class="footer">Los Angeles</p>
  </main>
</body>
</html>
