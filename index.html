<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Abraham</title>
  <meta name="description" content="Leonard Abraham — photographs, films, objects." />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #050505;
      --soft: #eeeeee;
      --muted: #9a9a9a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
      font-weight: 400;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 22px 24px;
    }

    .identity {
      position: relative;
      z-index: 2;
      display: inline-grid;
      gap: 8px;
      font-size: clamp(11px, 1.15vw, 15px);
      line-height: 1.05;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name {
      display: block;
    }

    .nav {
      display: flex;
      gap: 12px;
      align-items: center;
      white-space: nowrap;
    }

    .nav a,
    .nav span {
      display: inline-block;
    }

    .media-hold {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(36vw, 500px);
      aspect-ratio: 1198 / 1714;
      transform: translate(-50%, -46%);
      overflow: hidden;
      background: transparent;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      animation: fade 21s infinite;
      background-size: cover;
      background-position: center;
    }

    .slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .slide:nth-child(1) {
      animation-delay: 0s;
    }

    .slide:nth-child(2) {
      animation-delay: 7s;
      background:
        radial-gradient(circle at 43% 30%, rgba(255,255,255,0.42), transparent 20%),
        linear-gradient(180deg, #181818 0%, #444 55%, #111 100%);
    }

    .slide:nth-child(3) {
      animation-delay: 14s;
      background:
        linear-gradient(90deg, #f2f2f2 0 28%, #d7d7d7 28% 29%, #f8f8f8 29% 100%),
        linear-gradient(160deg, #efefef, #cfcfcf);
    }

    .contact {
      position: fixed;
      left: 24px;
      bottom: 22px;
      z-index: 2;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes fade {
      0% { opacity: 0; }
      7% { opacity: 1; }
      31% { opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100svh;
        padding: 18px;
      }

      .identity {
        font-size: 12px;
        gap: 7px;
      }

      .nav {
        gap: 9px;
      }

      .media-hold {
        width: calc(100vw - 36px);
        max-width: 420px;
        top: 52%;
      }

      .contact {
        left: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="identity" aria-label="Leonard Abraham site navigation">
      <a class="name" href="/">Leonard Abraham</a>
      <nav class="nav">
        <a href="#photographs">Photographs</a>
        <span>/</span>
        <a href="#films">Films</a>
        <span>/</span>
        <a href="#objects">Objects</a>
      </nav>
    </header>

    <section class="media-hold" aria-label="Rotating placeholder media">
      <div class="slide"><img src="assets/dossier-personage-45degree.jpg" alt="Dossier Personage portrait placeholder" /></div>
      <div class="slide" aria-hidden="true"></div>
      <div class="slide" aria-hidden="true"></div>
    </section>

    <a class="contact" href="mailto:info@leonardabraham.com">info@leonardabraham.com</a>
  </main>
</body>
</html>
